<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StayEasy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">

  <div class="auth-panel">
    <div style="font-size:3.5rem;margin-bottom:1.2rem;">🏠</div>
    <h2>Welcome Back</h2>
    <p>Log in to browse PGs, manage your listings, or review platform activity.</p>
    
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form">
      <a href="index.html" style="color:var(--brand);font-family:'Lora',serif;font-size:1.2rem;font-weight:700;display:block;margin-bottom:1.5rem;">🏠 StayEasy</a>
      <h2>Sign In</h2>
      <p class="sub">Don't have an account? <a href="register.html" style="color:var(--brand);font-weight:700;">Register</a></p>

      <div class="role-tabs">
        <button class="role-tab active" onclick="setRole('USER',this)">👤 Customer</button>
        <button class="role-tab"       onclick="setRole('OWNER',this)">🏠 Owner</button>
        <button class="role-tab"       onclick="setRole('ADMIN',this)">⚙️ Admin</button>
      </div>

      <div id="err" style="display:none;"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" id="pwd" placeholder="••••••••">
      </div>

      <button class="btn btn-primary" id="btn" onclick="login()" style="width:100%;justify-content:center;padding:.7rem;">
        Sign In →
      </button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  let role = 'USER';

  // Already logged in? Redirect
  if (Auth.loggedIn()) goHome(Auth.user()?.role);

  function goHome(r) {
    location.href = r==='ADMIN' ? 'admin.html' : r==='OWNER' ? 'owner.html' : 'user.html';
  }

  function setRole(r, btn) {
    role = r;
    document.querySelectorAll('.role-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if (r === 'ADMIN') {
      document.getElementById('email').value = 'admin@stayeasy.com';
      document.getElementById('pwd').value = 'admin123';
    } else {
      document.getElementById('email').value = '';
      document.getElementById('pwd').value = '';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.style.display = 'block';
    el.innerHTML = `<div class="alert alert-error">${msg}</div>`;
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('pwd').value;
    const btn   = document.getElementById('btn');
    document.getElementById('err').style.display = 'none';

    if (!email || !pwd) { showErr('Please enter email and password.'); return; }

    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const data = await Http.post('/auth/login', { email, password: pwd });
      if (data.role !== role) {
        showErr(`This is a ${data.role.toLowerCase()} account. Please select the correct tab.`);
        btn.disabled = false; btn.textContent = 'Sign In →';
        return;
      }
      Auth.save(data);
      Toast.show(`Welcome, ${data.name}! 👋`, 'ok');
      setTimeout(() => goHome(data.role), 600);
    } catch(e) {
      showErr(e.message);
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }

  document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
